<!DOCTYPE html>
<html>

<head>
<title>RadVoice AI</title>
</head>

<body>

<h1>RadVoice AI Whisper Test</h1>

<button id="start">
🎤 Start
</button>

<button id="stop">
⏹ Stop
</button>

<p id="status">
Ready
</p>

<textarea id="result"
rows="10"
cols="80"></textarea>


<script>

let recorder;
let chunks=[];


const startButton =
document.getElementById("start");

const stopButton =
document.getElementById("stop");

const status =
document.getElementById("status");



startButton.onclick = async function(){


console.log("start clicked");


const stream =
await navigator.mediaDevices.getUserMedia(
{
audio:true
});


recorder =
new MediaRecorder(stream);


chunks=[];


recorder.ondataavailable =
function(e){

chunks.push(e.data);

};


recorder.start();


status.innerText =
"Recording...";


};



stopButton.onclick = function(){


console.log("stop clicked");


if(!recorder){

alert("Recorder not started");

return;

}



recorder.onstop =
async function(){


status.innerText =
"Uploading...";


const audio =
new Blob(
chunks,
{
type:"audio/webm"
}
);



const form =
new FormData();


form.append(
"audio",
audio,
"voice.webm"
);



const response =
await fetch(
"/transcribe",
{
method:"POST",
body:form
}
);



const data =
await response.json();



document.getElementById(
"result"
).value =
data.text || data.error;


status.innerText =
"Done";


};



recorder.stop();


};


</script>

</body>

</html>

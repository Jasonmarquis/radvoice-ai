<!DOCTYPE html>
<html>

<head>
<title>RadVoice AI</title>
</head>

<body>

<h1>RadVoice AI Whisper Test</h1>

<button id="start">
🎤 Start
</button>

<button id="stop">
⏹ Stop
</button>

<p id="status">Ready</p>

<textarea id="result"
rows="10"
cols="80"></textarea>


<script>

let recorder;
let chunks = [];


document
.getElementById("start")
.onclick = async function(){


console.log("START");


let stream =
await navigator.mediaDevices.getUserMedia(
{
audio:true
}
);


recorder =
new MediaRecorder(stream);


chunks=[];


recorder.ondataavailable =
function(e){

chunks.push(e.data);

};


recorder.start();


document
.getElementById("status")
.innerText =
"Recording...";


};



document
.getElementById("stop")
.onclick = function(){


console.log("STOP");


recorder.onstop =
async function(){


let audio =
new Blob(
chunks,
{
type:"audio/webm"
}
);


let form =
new FormData();


form.append(
"audio",
audio,
"voice.webm"
);



let response =
await fetch(
"/transcribe",
{
method:"POST",
body:form
}
);



let data =
await response.json();


document
.getElementById("result")
.value =
data.text || data.error;


};


recorder.stop();


};


</script>


</body>

</html>
